[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control = "on"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), usb=(), serial=(), bluetooth=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    X-Permitted-Cross-Domain-Policies = "none"
    X-Site-Category = "veteran-health-tools"
    X-Site-Type = "functional-symptom-tracker"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=4096"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_KEY"
  # Required at build AND runtime on Netlify (Site configuration → Environment variables):
  # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY,
  # STRIPE_SECRET_KEY, STRIPE_PUBLIC_KEY, STRIPE_PRO_PRICE_ID, STRIPE_WEBHOOK_SECRET,
  # APP_URL=https://tracker.veteranscentralhub.us,
  # VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, REMINDER_CRON_SECRET

[functions."reminder-cron"]
  schedule = "0 * * * *"
